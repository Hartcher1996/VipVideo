<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP视频解析</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/dplayer@1.27.1/dist/DPlayer.min.css" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="container">
        <div class="logo" id="logoBtn">
          <span class="logo-icon">🎬</span>
          <span class="logo-text">VIP视频解析</span>
        </div>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="搜索视频名称..." aria-label="搜索视频" />
          <span id="searchClear" class="search-clear" role="button" aria-label="清除搜索" style="display:none;">×</span>
          <button id="searchBtn" class="search-btn" aria-label="搜索">搜索</button>
        </div>
      </div>
    </header>

    <main class="main container">
      <nav class="breadcrumb" id="breadcrumb">
        <span class="breadcrumb-item" data-page="home">首页</span>
      </nav>

      <div id="homePage" class="page active">
        <div class="section">
          <h2 class="section-title" id="listTitle">热门推荐</h2>
          <div id="videoList" class="video-grid">
            <div class="loading">加载中...</div>
          </div>
          <div class="pagination">
            <button id="prevPage" class="page-btn" disabled>上一页</button>
            <span id="pageInfo" class="page-info">第 1 页</span>
            <button id="nextPage" class="page-btn">下一页</button>
            <input type="number" id="jumpPage" class="jump-input" min="1" placeholder="1" aria-label="跳转到页码" />
            <button id="jumpBtn" class="page-btn">跳转</button>
          </div>
        </div>
      </div>

      <div id="detailPage" class="page">
        <div class="detail-toolbar">
          <button id="backBtn" class="back-btn">← 返回列表</button>
        </div>
        <div id="detailContent" class="detail-content">
          <div class="loading">加载中...</div>
        </div>
      </div>

      <div id="playerPage" class="page">
        <div class="player-toolbar">
          <button id="playerBackBtn" class="back-btn">← 返回详情</button>
        </div>
        <div class="player-layout">
          <div class="player-main">
            <div class="player-wrapper">
              <div id="dplayer"></div>
            </div>
            <div class="player-header">
              <h2 id="playerTitle" class="player-title"></h2>
              <div class="player-controls">
                <button id="prevEpBtn" class="ep-btn" disabled>上一集</button>
                <button id="nextEpBtn" class="ep-btn">下一集</button>
              </div>
            </div>
          </div>
          <div class="player-sidebar">
            <div class="sidebar-section">
              <div class="sidebar-tabs" id="playerSourceTabs"></div>
            </div>
            <div class="sidebar-section">
              <h3 class="sidebar-title">剧集列表</h3>
              <div class="episode-list" id="playerEpisodeList"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <p>© 2026 VIP视频解析 - 仅供学习交流使用</p>
      </div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dplayer@1.27.1/dist/DPlayer.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
